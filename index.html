<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#faf9f7"/>
<title>Spendwise</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --surface2: #f3f1ed;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #9e9b94;
  --user1: #1d4ed8;
  --user1-bg: #dbeafe;
  --user2: #7e22ce;
  --user2-bg: #f3e8ff;
  --red: #991b1b; --red-bg: #fee2e2;
  --amber: #92400e; --amber-bg: #fef3c7;
  --green: #166534; --green-bg: #dcfce7;
  --radius: 14px; --radius-sm: 9px;
  --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
  --font: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:88px;}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
#loader .logo{font-family:var(--serif);font-size:32px;}
#loader .sub{font-size:13px;color:var(--text3);}
.spin{animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loginScreen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.login-logo{font-family:var(--serif);font-size:38px;letter-spacing:-0.5px;margin-bottom:6px;}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:2.5rem;text-align:center;}
.user-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;}
.user-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all 0.18s;box-shadow:var(--shadow);}
.user-card:active{transform:scale(0.97);}
.user-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;margin:0 auto 10px;}
.user-name{font-size:15px;font-weight:500;}
.user-role{font-size:12px;color:var(--text3);margin-top:2px;}
#setupScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.setup-title{font-family:var(--serif);font-size:28px;margin-bottom:8px;text-align:center;}
.setup-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:2rem;line-height:1.6;}
.setup-form{width:100%;max-width:320px;}
.setup-input{width:100%;padding:12px 14px;font-size:15px;font-family:var(--font);border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);margin-bottom:12px;outline:none;transition:border-color 0.15s;}
.setup-input:focus{border-color:var(--border-strong);}
.setup-btn{width:100%;padding:13px;font-size:15px;font-weight:500;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);transition:opacity 0.15s;}
.setup-btn:active{opacity:0.8;}
.header{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px 16px 0;border-bottom:1px solid var(--border);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-wordmark{font-family:var(--serif);font-size:22px;letter-spacing:-0.3px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:6px;vertical-align:middle;}
.sync-dot.offline{background:#f59e0b;}
.sync-dot.error{background:#ef4444;}
.active-user-pill{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:background 0.15s;}
.active-user-pill:active{background:var(--surface2);}
.pill-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.month-nav{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px 10px;font-size:20px;line-height:1;}
.month-label{font-size:14px;font-weight:500;}
.tabs{display:flex;background:var(--surface);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:400;color:var(--text3);font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s;}
.tab i{font-size:22px;}
.tab.active{color:var(--text);font-weight:500;}
.section{display:none;padding:16px;animation:fadeUp 0.2s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.card+.card{margin-top:12px;}
.hero-card{background:var(--text);color:var(--bg);border-radius:var(--radius);padding:1.25rem 1.25rem 1.1rem;margin-bottom:12px;position:relative;overflow:hidden;}
.hero-card::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.04);}
.hero-label{font-size:12px;opacity:0.55;margin-bottom:4px;letter-spacing:0.04em;}
.hero-amount{font-family:var(--serif);font-size:40px;letter-spacing:-1px;margin-bottom:14px;line-height:1;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hero-stat{background:rgba(255,255,255,0.08);border-radius:10px;padding:9px 10px;}
.hero-stat-label{font-size:10px;opacity:0.5;margin-bottom:3px;}
.hero-stat-val{font-size:15px;font-weight:500;}
.alert{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:8px;}
.alert i{font-size:16px;flex-shrink:0;}
.alert-danger{background:var(--red-bg);color:var(--red);}
.alert-warn{background:var(--amber-bg);color:var(--amber);}
.split-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);}
.split-row:last-child{border-bottom:none;}
.split-user{display:flex;align-items:center;gap:8px;}
.split-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.split-name{font-size:14px;font-weight:500;}
.split-right{text-align:right;}
.split-amt{font-size:14px;font-weight:500;}
.split-pct{font-size:12px;color:var(--text3);}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;}
.section-head-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;}
.budget-row{padding:11px 14px;border-bottom:1px solid var(--border);}
.budget-row:last-child{border-bottom:none;}
.budget-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.budget-name-wrap{display:flex;align-items:center;gap:9px;}
.cat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.budget-name{font-size:14px;}
.budget-period{font-size:11px;color:var(--text3);}
.budget-right{text-align:right;}
.budget-spent-amt{font-size:14px;font-weight:500;}
.budget-of{font-size:12px;color:var(--text3);}
.bar-track{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:4px;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.bar-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
.add-hero{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.1rem;margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:0.02em;}
.form-group{margin-bottom:13px;}
.form-input{width:100%;padding:11px 13px;font-size:15px;font-family:var(--font);border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;-webkit-appearance:none;appearance:none;}
.form-input:focus{border-color:var(--border-strong);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.who-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.who-btn{padding:10px 8px;text-align:center;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text2);transition:all 0.15s;font-family:var(--font);}
.submit-btn{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.15s;}
.submit-btn:active{opacity:0.8;transform:scale(0.99);}
.submit-btn i{font-size:18px;}
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0;transition:all 0.15s;}
.filter-chip.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.exp-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.exp-item:last-child{border-bottom:none;}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.exp-info{flex:1;min-width:0;}
.exp-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-meta{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.who-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.tag{font-size:10px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:var(--text2);}
.exp-right{text-align:right;flex-shrink:0;}
.exp-amt{font-size:14px;font-weight:500;}
.exp-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:5px;font-size:17px;line-height:1;}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:12px;}
.insight-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.insight-title i{font-size:16px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-row:last-child{margin-bottom:0;}
.bar-label{font-size:13px;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-outer{flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.bar-inner{height:100%;border-radius:99px;}
.bar-val{font-size:12px;color:var(--text2);width:70px;text-align:right;flex-shrink:0;}
.ai-trigger{width:100%;padding:13px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);transition:background 0.15s;margin-bottom:12px;}
.ai-trigger:hover{background:var(--surface2);}
.ai-trigger i{font-size:18px;}
.ai-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;font-size:14px;line-height:1.75;color:var(--text);display:none;}
.settings-group{margin-bottom:20px;}
.settings-group-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.setting-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.setting-row:first-child{border-radius:var(--radius) var(--radius) 0 0;}
.setting-row:last-child{border-bottom:none;border-radius:0 0 var(--radius) var(--radius);}
.setting-row:only-child{border-radius:var(--radius);}
.setting-icon{width:22px;font-size:18px;color:var(--text2);text-align:center;flex-shrink:0;}
.setting-label{flex:1;font-size:14px;}
.setting-sub{font-size:12px;color:var(--text3);}
.setting-input{width:88px;text-align:right;padding:5px 8px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;}
.setting-input:focus{border-color:var(--border-strong);}
.del-cat{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;font-size:17px;}
.add-row{display:flex;gap:8px;margin-top:10px;}
.add-row input,.add-row select{padding:9px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;}
.add-row input{flex:1;}
.add-row select{width:90px;-webkit-appearance:none;appearance:none;}
.add-row-btn{padding:9px 14px;font-size:13px;font-weight:500;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px;}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.35;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="loader">
  <div class="logo">Spendwise</div>
  <i class="ti ti-loader-2 spin" style="font-size:24px;color:var(--text3)"></i>
  <div class="sub">Connecting…</div>
</div>
<div id="loginScreen" style="display:none">
  <div class="login-logo">Spendwise</div>
  <div class="login-sub">Family budget · Who are you?</div>
  <div class="user-cards" id="userCards"></div>
</div>
<div id="setupScreen" style="display:none">
  <div class="setup-title">Set up Spendwise</div>
  <div class="setup-sub">Enter your names to get started.<br/>Both partners will share one live view.</div>
  <div class="setup-form">
    <label class="form-label">Partner 1 name</label>
    <input class="setup-input" id="name1" placeholder="e.g. Dinesh" maxlength="20"/>
    <label class="form-label">Partner 2 name</label>
    <input class="setup-input" id="name2" placeholder="e.g. Priya" maxlength="20"/>
    <button class="setup-btn" onclick="completeSetup()">Get started →</button>
  </div>
</div>
<div id="appScreen" style="display:none">
  <div class="header">
    <div class="header-top">
      <span class="app-wordmark">Spendwise <span class="sync-dot" id="syncDot"></span></span>
      <div class="active-user-pill" onclick="switchUser()">
        <div class="pill-dot" id="headerDot"></div>
        <span id="headerName"></span>
        <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text3)"></i>
      </div>
    </div>
    <div class="month-row">
      <button class="month-nav" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-nav" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div id="tab-overview" class="section active"></div>
  <div id="tab-add" class="section"></div>
  <div id="tab-history" class="section"></div>
  <div id="tab-insights" class="section"></div>
  <div id="tab-settings" class="section"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')"><i class="ti ti-chart-pie-2"></i>Overview</button>
    <button class="tab" onclick="switchTab('add')"><i class="ti ti-circle-plus"></i>Add</button>
    <button class="tab" onclick="switchTab('history')"><i class="ti ti-list"></i>History</button>
    <button class="tab" onclick="switchTab('insights')"><i class="ti ti-sparkles"></i>Insights</button>
    <button class="tab" onclick="switchTab('settings')"><i class="ti ti-settings-2"></i>Settings</button>
  </div>
</div>
<div class="toast" id="toast"></div>

const CAT_ICONS=['ti-fork','ti-car','ti-shopping-bag','ti-heart','ti-bolt','ti-device-tv','ti-shield','ti-home','ti-briefcase','ti-gift','ti-plane','ti-book','ti-dots'];
const CAT_PALS=[{color:'#e07b54',bg:'#fdf0eb'},{color:'#2d9d78',bg:'#e8f7f2'},{color:'#7c5cbf',bg:'#f1ecfb'},{color:'#c2436a',bg:'#fceef4'},{color:'#c47d0e',bg:'#fef5e4'},{color:'#2c6fad',bg:'#e8f1fb'},{color:'#3d7a5e',bg:'#ebf5f1'},{color:'#787672',bg:'#f2f1ef'}];
window.addCat=function(){const name=document.getElementById('newCatName').value.trim();const type=document.getElementById('newCatType').value;if(!name)return;const id='cat_'+Date.now();const cats=appData.categories||[];const pal=CAT_PALS[cats.length%CAT_PALS.length];const icon=CAT_ICONS[cats.length%CAT_ICONS.length];cats.push({id,name,icon,color:pal.color,bg:pal.bg});appData.categories=cats;if(!appData.limits)appData.limits={};appData.limits[id]=type==='yearly'?{monthly:0,yearly:5000}:{monthly:2000,yearly:0};saveToFirebase(appData);document.getElementById('newCatName').value='';renderSettings();};
window.exportData=function(){const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='spendwise-backup.json';a.click();};
window.confirmReset=function(){if(confirm('Delete ALL data from Firebase? This cannot be undone.')){set(dbRef('spendwise'),null).then(()=>{localStorage.clear();location.reload();});}};
window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);};
init();
</script>
</body>
</html>
